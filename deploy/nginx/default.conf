# Single entry (port 80): Django under /api/ and /admin/, FastAPI for everything else (e.g. /screening, /docs).
# Set NEXT_PUBLIC_DJANGO_API_URL and NEXT_PUBLIC_FASTAPI_API_URL both to http(s)://<vm-public-ip-or-dns> when using one host.

upstream django_upstream {
    server django_app:8000;
}

upstream fastapi_upstream {
    server fastapi_ai:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /media/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://fastapi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
