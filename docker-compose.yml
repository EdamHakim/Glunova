services:
  django_app:
    build:
      context: ./backend/django_app
    container_name: glunova-django
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Django in Docker must use the compose service name, not localhost.
      AI_SERVICE_URL: http://fastapi_ai:8001
    ports:
      - "8000:8000"

  fastapi_ai:
    build:
      context: ./backend/fastapi_ai
    container_name: glunova-fastapi
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8001:8001"
