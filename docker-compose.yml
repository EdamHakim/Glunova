services:
  django_app:
    build:
      context: ./backend/django_app
    container_name: glunova-django
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    ports:
      - "8000:8000"
    networks:
      - glunova

  fastapi_ai:
    build:
      context: ./backend/fastapi_ai
    container_name: glunova-fastapi
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8001"
    ports:
      - "8001:8001"
    networks:
      - glunova

  nginx:
    image: nginx:1.27-alpine
    container_name: glunova-nginx
    restart: unless-stopped
    depends_on:
      - django_app
      - fastapi_ai
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - glunova

networks:
  glunova:
    driver: bridge
